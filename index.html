<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sentiment Analyzer</title>
</head>
<body>
    <h1>Sentiment Analyzer</h1>
    <textarea id="textInput" placeholder="Type something..."></textarea>
    <button onclick="analyze()">Analyze</button>
    <div id="result"></div>

    <script>
        async function analyze() {
            const text = document.getElementById("textInput").value;

            const response = await fetch("https://sentiment-api-0y4h.onrender.com/analyze", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({text: text})
            });

            const data = await response.json();
            document.getElementById("result").innerHTML = 
                `Top emotion: ${data.message[0][0].label} (${(data.message[0][0].score * 100).toFixed(1)}%)`;
        }
    </script>
</body>
</html>
